services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       verifyiq
      POSTGRES_USER:     verifyiq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/prisma/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verifyiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?err} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  ml:
    build:
      context: ./apps/ml
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      AADHAAR_SALT: ${AADHAAR_SALT:?err}
      MODEL_DIR:    /app/models
    volumes:
      - ./apps/ml/models:/app/models:ro
      - ./apps/ml/keys:/app/keys:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    depends_on:
      postgres: { condition: service_healthy }

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL:    postgresql://verifyiq:${POSTGRES_PASSWORD}@postgres:5432/verifyiq
      REDIS_URL:       redis://:${REDIS_PASSWORD}@redis:6379
      ML_SERVICE_URL:  http://ml:8000
      JWT_SECRET:      ${JWT_SECRET:?err}
      API_KEY_SALT:    ${API_KEY_SALT:?err}
      FRONTEND_URL:    ${FRONTEND_URL:-http://localhost:3000}
      PORT:            3001
    ports:
      - "3001:3001"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      ml:       { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      api: { condition: service_healthy }

volumes:
  postgres_data:
  redis_data:
