name: VerifyIQ CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/verifyiq

jobs:
  # ── Type Check + Lint ─────────────────────────────────────────────────────
  lint:
    name: TypeScript + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run type-check -w apps/api
      - run: npm run type-check -w apps/web
      - run: npm run lint -w apps/api

  # ── Python Type Check ─────────────────────────────────────────────────────
  python-check:
    name: Python Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install mypy pydantic fastapi onnxruntime Pillow numpy cryptography
        working-directory: apps/ml
      - run: python -m mypy main.py routers/ agents/ algorithms/ schemas/ --ignore-missing-imports
        working-directory: apps/ml

  # ── Build Docker Images ───────────────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [lint, python-check]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [ml, api, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Integration Tests ─────────────────────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, python-check]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       verifyiq_test
          POSTGRES_USER:     verifyiq
          POSTGRES_PASSWORD: test_secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL:   postgresql://verifyiq:test_secret@localhost:5432/verifyiq_test
      JWT_SECRET:     test_jwt_secret_32_chars_minimum!
      API_KEY_SALT:   test_api_key_salt_32_chars_min!!
      AADHAAR_SALT:   test_aadhaar_salt_32_chars_min!!
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx prisma migrate deploy
        working-directory: apps/api
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
        working-directory: apps/ml
      - run: python -m pytest tests/ -v --tb=short
        working-directory: apps/ml
