services:


  # The NestJS API Backend
  - type: web
    name: verifyiq-api
    env: docker
    dockerContext: verifyiq/apps/api
    dockerfilePath: verifyiq/apps/api/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: verifyiq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: verifyiq-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: API_KEY_SALT
        generateValue: true
      - key: FRONTEND_URL
        sync: false # Set in dashboard to your Vercel URL (e.g. https://verifyiq.vercel.app)

  # Redis Service
  - type: redis
    name: verifyiq-redis
    plan: free
    ipAllowList: []

databases:
  # PostgreSQL Database
  - name: verifyiq-db
    databaseName: verifyiq
    user: verifyiq
    plan: free
